name: Release

# Two paths in:
#  - push a tag like v0.2.1 → full build + GitHub Release with attached artifacts
#  - workflow_dispatch     → full build, artifacts uploaded but no Release created
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # required for the release job to upload assets
  id-token: write   # required for npm provenance attestation

jobs:
  test:
    # Single-platform run, but across the full supported Node range (engines
    # says >=18) so the compatibility claim is actually verified. The codebase
    # is platform-neutral except for the SEA build step (which the `build` job
    # covers per-OS), so testing once per Node version on Linux is enough to
    # gate the build matrix and the publish jobs below.
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install deps
        run: npm ci || npm install
      - name: Run tests
        run: npm test
      # The Cloudflare Worker is the only public-facing telemetry surface, so
      # its tests must gate releases too. It's a separate package with its own
      # lockfile; run them here rather than leaving them unverified in CI.
      - name: Run worker tests
        run: |
          npm --prefix worker ci || npm --prefix worker install
          npm --prefix worker test

  build:
    name: Build (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest      # Apple Silicon — produces arm64 .dmg
            cli-out: claude-rpc
            artifact-name: claude-rpc-macos-arm64
            # .yml + .blockmap are the auto-update feed files electron-updater
            # reads to discover new versions. They MUST land in the release.
            dist-glob: |
              dashboard/dist/*.dmg
              dashboard/dist/*.yml
              dashboard/dist/*.blockmap
          - os: windows-latest    # x64 Windows — produces NSIS .exe + portable .exe
            cli-out: claude-rpc.exe
            artifact-name: claude-rpc-windows-x64
            dist-glob: |
              dashboard/dist/*.exe
              dashboard/dist/*.yml
              dashboard/dist/*.blockmap
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      # Root deps (esbuild, postject for the SEA build).
      - name: Install root deps
        run: npm ci || npm install

      # Build the SEA CLI binary for THIS runner's platform.
      - name: Build CLI binary
        run: npm run build:exe

      # Stage the binary into dashboard/resources/bin/ so electron-builder
      # bundles it via extraResources.
      - name: Stage CLI into dashboard
        run: node scripts/prep-dashboard.js

      # Dashboard deps + installer build.
      - name: Install dashboard deps
        working-directory: dashboard
        run: npm ci || npm install

      - name: Build installer (mac)
        if: runner.os == 'macOS'
        working-directory: dashboard
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        # --publish never: electron-builder picks up the github publish config
        # from package.json but we want the release job (not the build job) to
        # attach files, so explicitly tell it not to publish itself.
        run: npx electron-builder --mac dmg --publish never

      - name: Build installer (win)
        if: runner.os == 'Windows'
        working-directory: dashboard
        run: npx electron-builder --win nsis portable --x64 --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            dist/${{ matrix.cli-out }}
            ${{ matrix.dist-glob }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: Flatten artifact tree
        # Include update-feed files (latest*.yml, *.blockmap) alongside the
        # installers so electron-updater can discover new versions.
        run: |
          mkdir -p release
          find artifacts -type f \( \
              -name '*.dmg' \
              -o -name '*.exe' \
              -o -name '*.yml' \
              -o -name '*.blockmap' \
              -o -name 'claude-rpc' \
            \) -exec cp {} release/ \;
          ls -la release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false

  publish-npm:
    name: Publish to npm
    # Gated behind BOTH test and build: a green test with a red binary build
    # would otherwise ship an npm release with no matching .dmg/.exe in the
    # GitHub Release the site links to. Wait for the binaries to succeed first.
    needs: [test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC for npm --provenance
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      # Guard against a tag/package.json mismatch: pushing tag v0.13.1 while
      # package.json still says 0.13.0 would otherwise publish 0.13.0 under a
      # release labelled v0.13.1. Fail loudly instead.
      - name: Assert tag matches package.json version
        run: |
          PKG_V="v$(node -p "require('./package.json').version")"
          if [ "$PKG_V" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json ($PKG_V)"
            exit 1
          fi

      # The package has a single runtime dep and no build step — `npm publish`
      # only needs the files listed in package.json's `files` field. No
      # `npm install` required before publishing.
      #
      # Idempotent: if this version was already published (e.g. a manual
      # `npm publish` from a workstation before the tag was pushed), npm would
      # otherwise 403 with "cannot publish over previously published versions"
      # and turn the run red. Detect that case and skip instead of failing.
      - name: Publish
        run: |
          V=$(node -p "require('./package.json').version")
          if npm view "claude-rpc@$V" version >/dev/null 2>&1; then
            echo "claude-rpc@$V is already on npm — skipping publish."
            exit 0
          fi
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
