# Keep GitHub Actions current. Our workflows pin every action to a full commit
# SHA (supply-chain hardening — a moved tag can't silently change our release
# pipeline, which holds id-token + the npm token). Dependabot reads the trailing
# `# vX.Y.Z` comment, so it bumps both the SHA and the comment together when a
# new release ships. Grouped into a single weekly PR to keep the noise low.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - '*'
