name = "claude-rpc-totals"
main = "src/index.js"
compatibility_date = "2026-05-01"
workers_dev = true
preview_urls = false

# The KV namespace that holds total:sessions, total:tokens, seen:<id>,
# and rate:<id>. Create one with:
#   wrangler kv:namespace create TOTALS
# and paste the returned `id` below. For local development add a `preview_id`
# from `wrangler kv:namespace create TOTALS --preview`.

[[kv_namespaces]]
binding = "TOTALS"
id = "6ca3b87cd4cc46469008d28558701dac"

# Web login (GitHub OAuth). GITHUB_CLIENT_ID is public; the two secrets are
# set out-of-band:
#   wrangler secret put GITHUB_CLIENT_SECRET   (from the GitHub OAuth app)
#   wrangler secret put SESSION_SECRET         (any long random string)
# Register the OAuth app's callback URL as:
#   https://claude-rpc-totals.claude-rpc.workers.dev/auth/callback
[vars]
GITHUB_CLIENT_ID = "Ov23liFCtlBWX8BHepyh"
SITE_ORIGIN = "https://claude-rpc.com"
