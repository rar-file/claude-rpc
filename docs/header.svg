<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" width="1000" height="260" role="img" aria-labelledby="t d">
  <title id="t">claude-rpc</title>
  <desc id="d">claude-rpc — Discord Rich Presence for Claude Code. Live model, project, tokens, and lifetime stats, driven by the hooks Claude Code already fires. Install with: npx claude-rpc setup. Shown beside an example Discord rich-presence card: the claude-rpc app art (the clawd builder), Claude Code, Working in claude-rpc, Opus 4.7 · 2.3k tokens, 00:23 elapsed, with Claude Code and View on GitHub buttons.</desc>
  <defs>
    <style>
      .disp { font-family: "Space Grotesk", "Inter Tight", system-ui, sans-serif; }
      .mono { font-family: "JetBrains Mono", "DejaVu Sans Mono", ui-monospace, monospace; }
    </style>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#2b2722" fill-opacity="0.05"/>
    </pattern>
    <clipPath id="tile"><rect x="22" y="46" width="64" height="64" rx="12"/></clipPath>
  </defs>

  <rect width="1000" height="260" fill="#f4ede0"/>
  <rect width="1000" height="260" fill="url(#dots)"/>
  <rect width="1000" height="7" fill="#d97757"/>

  <!-- left: masthead -->
  <text x="55" y="54" class="mono" font-size="14" font-weight="700" letter-spacing="4" fill="#b8552f">DISCORD RICH PRESENCE</text>
  <text x="52" y="126" class="disp" font-size="70" font-weight="800" letter-spacing="-2" fill="#2b2722">claude-<tspan fill="#d97757">rpc</tspan></text>
  <text x="55" y="160" class="disp" font-size="20" font-weight="500" fill="#2b2722">Claude Code, live on Discord</text>
  <text x="55" y="185" class="mono" font-size="12.5" fill="#6b6357">live model · project · tokens · lifetime stats — driven by hooks</text>
  <rect x="55" y="202" width="292" height="32" rx="4" fill="#2b2722"/>
  <text x="71" y="223" class="mono" font-size="15" fill="#d97757">$</text>
  <text x="88" y="223" class="mono" font-size="15" fill="#f4ede0">npx claude-rpc setup</text>
  <text x="56" y="252" class="mono" font-size="11" fill="#9a9183">MIT · macOS · Windows · Linux · zero runtime dependencies</text>

  <!-- right: a faithful copy of the real Discord rich-presence card (see docs/demo.gif) -->
  <g transform="translate(580 24)">
    <rect x="7" y="8" width="396" height="212" rx="14" fill="#1a1b1e" opacity="0.22"/>
    <rect width="396" height="212" rx="14" fill="#2b2d31" stroke="#202227" stroke-width="1.5"/>

    <text x="22" y="32" class="mono" font-size="9.5" font-weight="700" letter-spacing="1.6" fill="#b5bac1">PLAYING A GAME</text>

    <!-- large image (the clawd app art) + bottom-right status badge -->
    <rect x="22" y="46" width="64" height="64" rx="12" fill="#0c0c0c"/>
    <image x="22" y="46" width="64" height="64" clip-path="url(#tile)" preserveAspectRatio="xMidYMid slice" href="data:image/png;base64,"/>
    <circle cx="84" cy="104" r="8.5" fill="#23a55a" stroke="#2b2d31" stroke-width="3.5"/>

    <!-- activity text: name / details / state(model · tokens) / elapsed -->
    <text x="102" y="64" class="disp" font-size="16" font-weight="700" fill="#f2f3f5">Claude Code</text>
    <text x="102" y="85" class="disp" font-size="13" font-weight="400" fill="#dbdee1">Working in claude-rpc</text>
    <text x="102" y="103" class="disp" font-size="12.5" font-weight="400" fill="#b5bac1">Opus 4.7 · 2.3k tokens</text>
    <text x="102" y="121" class="disp" font-size="11.5" font-weight="400" fill="#949ba4">00:23 elapsed</text>

    <!-- two full-width grey buttons (Discord rich-presence style) -->
    <rect x="22" y="132" width="352" height="33" rx="5" fill="#4e5058"/>
    <text x="198" y="153.5" class="disp" font-size="13" font-weight="600" fill="#f2f3f5" text-anchor="middle">Claude Code</text>
    <rect x="22" y="170" width="352" height="33" rx="5" fill="#4e5058"/>
    <text x="198" y="191.5" class="disp" font-size="13" font-weight="600" fill="#f2f3f5" text-anchor="middle">View on GitHub</text>
  </g>
</svg>
